site_name: Rust Coding Standards Skills
site_url: https://smile9493.github.io/Rust_Coding_Standards_Skills/
site_description: >-
  A comprehensive set of Rust engineering skill guides covering architecture,
  systems, Wasm, embedded, data engineering, networking, CLI/devops, gamedev,
  blockchain, and AI/ML inference.
repo_url: https://github.com/smile9493/Rust_Coding_Standards_Skills
repo_name: smile9493/Rust_Coding_Standards_Skills

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Guides: 指南
            Architecture Guide (Constitution): 架构指南（宪法）
            Systems & Cloud Infra Guide: 系统与云基础设施指南
            Wasm Frontend Infra Guide: Wasm 前端基础设施指南
            Embedded & IoT Guide: 嵌入式与物联网指南
            Data Engineering Guide: 数据工程指南
            Networking Protocols Guide: 网络协议指南
            CLI & DevOps Guide: CLI 与 DevOps 指南
            Gamedev Guide: 游戏开发指南
            Blockchain Guide: 区块链指南
            AI/ML Inference Guide: AI/ML 推理指南

nav:
  - Home: index.md
  - Guides:
    - Architecture Guide (Constitution): rust-architecture-guide/SKILL.md
    - Systems & Cloud Infra Guide: rust-systems-cloud-infra-guide/SKILL.md
    - Wasm Frontend Infra Guide: rust-wasm-frontend-infra-guide/SKILL.md
    - Embedded & IoT Guide: rust-embedded-iot-guide/SKILL.md
    - Data Engineering Guide: rust-data-engineering-guide/SKILL.md
    - Networking Protocols Guide: rust-networking-protocols-guide/SKILL.md
    - CLI & DevOps Guide: rust-cli-devops-guide/SKILL.md
    - Gamedev Guide: rust-gamedev-guide/SKILL.md
    - Blockchain Guide: rust-blockchain-guide/SKILL.md
    - AI/ML Inference Guide: rust-ai-ml-inference-guide/SKILL.md

exclude_docs: |
  **/README.md
  **/README.zh-CN.md
